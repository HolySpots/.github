<!-- @dsCard group="Spacing" viewport="700x170" name="Responsive breakpoints" subtitle="Phone ≤480 · Tablet 481–1024 · Desktop ≥1025" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-core);display:flex;gap:20px;padding:18px;align-items:flex-end;font-size:11px;color:var(--text-secondary)}
.d{display:flex;flex-direction:column;gap:7px;align-items:center;text-align:center}
.scr{border:2px solid var(--gray-400);border-radius:6px;background:#fff;display:flex}
.pane{background:var(--cloud-200);margin:4px;border-radius:2px;flex:1}</style></head><body>
<div class="d"><div class="scr" style="width:64px;height:110px;flex-direction:column"><div class="pane"></div></div>Phone ≤480<br>single column, bottom bars</div>
<div class="d"><div class="scr" style="width:150px;height:110px"><div class="pane" style="flex:0 0 44px"></div><div class="pane" style="background:var(--blue-100)"></div></div>Tablet 481–1024<br>split view: list + map/detail</div>
<div class="d"><div class="scr" style="width:210px;height:118px;flex-direction:column"><div class="pane" style="flex:0 0 16px;background:var(--blue-400)"></div><div class="pane"></div></div>Desktop ≥1025<br>pill menu, cloud canvas, ≤1200px content</div>
<div style="flex:1;line-height:1.6">Touch: min 44px targets, 50px bars.<br>Desktop keeps the 59px admin controls.<br>Hover states are desktop-only.</div>
</body></html>
