<!-- @dsCard group="Colors" viewport="700x150" name="Warm accents & semantics" subtitle="Coral for destructive; reds for errors — the only warm colors" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-core);display:flex;gap:10px;padding:14px;align-items:center}
.sw{flex:1;height:122px;border-radius:6px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;box-sizing:border-box;color:#fff;font-size:12px}
.sw b{font-size:13px}
.use{flex:1.4;font-size:13px;color:var(--text-admin);line-height:1.6;padding:0 6px}</style></head><body>
<div class="sw" style="background:var(--coral-500)"><b>--coral-500</b>#fe835d · delete / cancel</div>
<div class="sw" style="background:var(--red-500)"><b>--red-500</b>#ff5e5e · validation errors</div>
<div class="sw" style="background:var(--red-600)"><b>--red-600</b>#fe443a · strong danger</div>
<div class="use">Delete buttons fill coral with white text; Cancel is cloud with coral text. Error text is #ff5e5e at 14px. No green success color exists in the system — confirmations use blue.</div>
</body></html>
