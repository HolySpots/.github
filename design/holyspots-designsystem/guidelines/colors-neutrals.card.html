<!-- @dsCard group="Colors" viewport="700x150" name="Neutral ramp" subtitle="Gray ramp from Android color.xml + admin.less" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-core);display:flex;padding:14px;gap:0}
.sw{flex:1;height:96px;display:flex;align-items:flex-end;padding:6px;box-sizing:border-box;font-size:10px;color:var(--gray-700)}
.dark{color:#fff}
.lbl{writing-mode:vertical-rl;transform:rotate(180deg)}</style></head><body>
<div class="sw" style="background:var(--gray-50)"><span class="lbl">50 #f9f9f9</span></div>
<div class="sw" style="background:var(--gray-100)"><span class="lbl">100 #f5f5f5</span></div>
<div class="sw" style="background:var(--gray-150)"><span class="lbl">150 #eeeded</span></div>
<div class="sw" style="background:var(--gray-200)"><span class="lbl">200 #e0e0e0</span></div>
<div class="sw" style="background:var(--gray-250)"><span class="lbl">250 #dddddd</span></div>
<div class="sw" style="background:var(--gray-300)"><span class="lbl">300 #d9d9d9</span></div>
<div class="sw" style="background:var(--gray-400)"><span class="lbl">400 #c6c6c6</span></div>
<div class="sw" style="background:var(--gray-500)"><span class="lbl">500 #b2b6bb</span></div>
<div class="sw dark" style="background:var(--gray-600)"><span class="lbl">600 #9b9b9b</span></div>
<div class="sw dark" style="background:var(--gray-700)"><span class="lbl">700 #575f6a</span></div>
<div class="sw dark" style="background:var(--gray-800)"><span class="lbl">800 #4a4a4a</span></div>
<div class="sw dark" style="background:var(--black)"><span class="lbl">black</span></div>
</body></html>
