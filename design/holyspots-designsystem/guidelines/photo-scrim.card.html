<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-core)}
.photo{position:relative;height:180px;background:url(../assets/images/region_photo_1.jpg) center/cover}
.scrim{position:absolute;inset:auto 0 0 0;height:70%;background:var(--scrim-photo)}
.meta{position:absolute;left:15px;right:15px;bottom:10px;display:flex;justify-content:space-between;align-items:flex-end;color:var(--text-on-photo)}
.name{font-size:18px}.count{font-size:18px;display:flex;align-items:center;gap:6px}
.count img{width:12px;height:17px}</style></head><body>
<div class="photo"><div class="scrim"></div>
<div class="meta"><span class="name">Vrindavan</span><span class="count"><img src="../assets/icons/icon_pin_white.png" alt="">52</span></div>
</div></body></html>
